namespace: cicd-app-dev
name: backend-cars
nameOverride: "backend-cars"

replicaCount: 1

nodeSelector:
  app:
    role: app

image:
  repository: distefano119/cicd-app-backend-cars
  tag: backend-cars-v1.0.2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7000

config:
  APP_LOGS_PATH: "/app/logs"
  ALERT_EMAIL: "test@gmail.com"
  SERVICE_NAME: "ITOUTPOSTS"
  DB_NAME: "monitoring"
  COLLECTION_NAME: "script_errors"
  DATASET_SLUG: "abdulmalik1518/cars-datasets-2025"
  CSV_NAME: "Cars Datasets 2025.csv"

secret:
  MONGO_URI: "mongodb://mongodb:27017"