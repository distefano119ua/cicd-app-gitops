apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/distefano119ua/cicd-app-gitops.git
    targetRevision: main
    path: charts/mongodb
    helm:
      releaseName: mongodb

  destination:
    server: https://kubernetes.default.svc
    namespace: cicd-app-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
