apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default

  source:
    repoURL: https://github.com/distefano119ua/cicd-app-gitops.git
    targetRevision: main
    path: charts/nginx
    helm:
      releaseName: nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: cicd-app-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
