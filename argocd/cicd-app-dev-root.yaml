apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-app-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/distefano119ua/cicd-app-gitops.git
    targetRevision: main
    path: argocd/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true